<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>吃瓜迷阵 — 圆明园万花阵迷宫探索</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0d1b0e 0%, #1a3320 50%, #0d1b0e 100%);
  min-height: 100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family: "Microsoft YaHei","PingFang SC",sans-serif;
  overflow: hidden; position: relative; touch-action: none;
}

/* 右上角控制区 */
#top-right-controls {
  position: fixed; top: 10px; right: 10px; z-index: 60;
  display: flex; flex-direction: column; gap: 5px; align-items: center;
}
.ctrl-icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(93,202,165,0.3);
  background: rgba(15,40,20,0.75);
  color: rgba(93,202,165,0.7);
  font-size: 15px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-icon-btn:hover { background: rgba(93,202,165,0.15); }
.ctrl-icon-btn:active { transform: scale(0.9); }
.ctrl-icon-btn.active {
  background: rgba(93,202,165,0.2);
  color: #5DCAA5;
  border-color: rgba(93,202,165,0.6);
}
.lang-separator { width: 20px; height: 1px; background: rgba(93,202,165,0.15); margin: 1px 0; }

#game-wrap {
  position: relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  width: 100%; max-width: 440px;
}

/* 状态栏 */
#status-bar {
  display:flex; justify-content:space-between; align-items:center;
  width:100%; padding:8px 12px;
  background: rgba(15,40,20,0.8); border-radius:10px;
  border:1px solid rgba(93,202,165,0.2);
}
.status-item { display:flex; flex-direction:column; align-items:center; }
.status-label { font-size:10px; color:rgba(93,202,165,0.6); letter-spacing:1px; }
.status-value { font-size:15px; font-weight:700; color:#5DCAA5; }
#energy-bar-wrap { width:80px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; margin-top:2px; }
#energy-bar { height:100%; background:linear-gradient(90deg,#97C459,#5DCAA5); border-radius:3px; transition:width 0.3s; }

/* 3D容器 */
#maze-3d {
  width: 400px; height: 400px;
  max-width: 100%;
  border:2px solid rgba(93,202,165,0.15);
  border-radius:12px;
  background:#0a120a;
  touch-action:none;
  overflow:hidden;
  position:relative;
}
#maze-3d canvas { display:block; }

/* 技能栏 */
#skill-bar {
  display:flex; gap:8px; width:100%; justify-content:center;
}
.skill-btn {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 16px; border-radius:10px; border:2px solid;
  background:rgba(15,40,20,0.6); cursor:pointer; transition:all 0.2s;
  font-size:13px; font-weight:700;
}
.skill-btn.active { transform:scale(1.05); }
.skill-cost { font-size:10px; opacity:0.7; }
.skill-btn:disabled { opacity:0.3; cursor:not-allowed; }

/* 控制按钮 */
#ctrl-bar { display:flex; gap:8px; }
.ctrl-btn {
  padding:6px 14px; border-radius:8px; border:1px solid rgba(93,202,165,0.3);
  background:rgba(15,40,20,0.6); color:#5DCAA5; cursor:pointer;
  font-size:12px; transition:all 0.2s;
}
.ctrl-btn:hover { background:rgba(93,202,165,0.15); }
.ctrl-btn:active { transform:scale(0.95); }

/* 遮罩弹窗 */
#overlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.75); z-index:100;
  align-items:center; justify-content:center;
}
#overlay.show { display:flex; }
.overlay-box {
  background:linear-gradient(135deg,#1a3320,#0d1b0e);
  border:2px solid rgba(93,202,165,0.3);
  border-radius:16px; padding:30px 24px; text-align:center;
  max-width:340px; width:90%;
}
.overlay-title { font-size:24px; font-weight:900; margin-bottom:8px; }
.overlay-desc { font-size:14px; color:rgba(255,255,255,0.7); margin-bottom:16px; line-height:1.6; }
.overlay-btn {
  padding:12px 32px; border-radius:10px; border:none; cursor:pointer;
  font-size:16px; font-weight:700; transition:all 0.2s;
}

/* 知识卡弹窗 */
#kc-modal {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.8); z-index:200;
  align-items:center; justify-content:center;
}
#kc-modal.show { display:flex; }
.kc-box {
  background:linear-gradient(135deg,#1a2a1e,#0d1b0e);
  border:2px solid rgba(215,175,23,0.4);
  border-radius:14px; padding:24px 20px; max-width:340px; width:90%;
}
.kc-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.kc-emoji { font-size:36px; }
.kc-name { font-size:18px; font-weight:700; color:#FAC775; }
.kc-title { font-size:13px; color:rgba(255,255,255,0.6); }
.kc-intro { font-size:13px; color:rgba(255,255,255,0.8); line-height:1.7; margin-bottom:14px; text-indent:2em; }
.kc-facts { font-size:12px; color:rgba(255,255,255,0.5); line-height:1.6; margin-bottom:16px; padding:10px; background:rgba(255,255,255,0.03); border-radius:8px; }
.kc-btn {
  width:100%; padding:10px; border-radius:8px; border:none; cursor:pointer;
  background:#BA7517; color:#fff; font-size:14px; font-weight:700;
}

/* 开瓜弹窗 */
#melon-pop {
  display:none; position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%); z-index:150;
  pointer-events:none;
}
#melon-pop.show { display:block; }
.melon-pop-inner {
  text-align:center; animation:popUp 1.2s ease-out forwards;
}
@keyframes popUp {
  0% { opacity:0; transform:scale(0.3) translateY(20px); }
  30% { opacity:1; transform:scale(1.2) translateY(0); }
  60% { opacity:1; transform:scale(1) translateY(-10px); }
  100% { opacity:0; transform:scale(1) translateY(-60px); }
}
.melon-emoji { font-size:48px; }
.melon-text { font-size:16px; font-weight:700; margin-top:4px; }
.melon-energy { font-size:14px; }

/* 提示 */
#toast {
  position:fixed; top:60px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.8); color:#5DCAA5; padding:8px 20px;
  border-radius:20px; font-size:13px; z-index:90;
  opacity:0; transition:opacity 0.3s; pointer-events:none;
}
#toast.show { opacity:1; }

/* 通关庆祝文字 */
#celebration-text {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:48px; font-weight:900;
  color:#FAC775;
  text-shadow:0 0 20px rgba(250,199,117,0.6), 3px 3px 0 #1a3320;
  z-index:80; pointer-events:none;
  white-space:nowrap;
}
#celebration-text.show {
  animation:celebratePop 2.5s ease-out forwards;
}
@keyframes celebratePop {
  0% { opacity:0; transform:translate(-50%,-50%) scale(0); }
  15% { opacity:1; transform:translate(-50%,-50%) scale(1.4); }
  25% { transform:translate(-50%,-50%) scale(1); }
  75% { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
  100% { opacity:0; transform:translate(-50%,-50%) scale(1.1); }
}

/* 入口页 */
#entry-screen {
  display:flex; flex-direction:column; align-items:center; gap:24px;
  padding:40px 20px;
}
.entry-title {
  font-size:36px; font-weight:900;
  background:linear-gradient(180deg,#5DCAA5 0%,#1D9E75 50%,#0F6E56 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; letter-spacing:4px;
}
.entry-sub { font-size:14px; color:rgba(93,202,165,0.6); letter-spacing:6px; }
.entry-mask { font-size:56px; animation:bounce 2s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
.level-select { display:flex; flex-direction:column; gap:12px; width:100%; max-width:280px; }
.level-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  padding:14px; border-radius:12px; border:2px solid rgba(93,202,165,0.3);
  background:rgba(15,40,20,0.6); color:#5DCAA5; cursor:pointer;
  font-size:16px; font-weight:700; transition:all 0.2s; text-decoration:none;
}
.level-btn:hover { background:rgba(93,202,165,0.15); border-color:rgba(93,202,165,0.6); }
.level-btn.locked { opacity:0.3; cursor:not-allowed; }
.level-btn-desc { font-size:11px; font-weight:400; opacity:0.6; }
.entry-footer { font-size:12px; color:rgba(255,255,255,0.2); margin-top:20px; }

.hidden { display:none !important; }
</style>
</head>

<!-- 入口页 -->

<div id="game-wrap" class="hidden">
  <div id="status-bar">
    <div class="status-item">
      <div class="status-label" id="lbl-level"></div>
      <div class="status-value" id="lv-display"></div>
    </div>
    <div class="status-item">
      <div class="status-label" id="lbl-rank"></div>

    <div class="status-item">
      <div class="status-label" id="lbl-energy"></div>
      <div class="status-value" id="energy-display"></div>

    </div>
    <div class="status-item">
      <div class="status-label" id="lbl-collected"></div>

  <div id="maze-3d"></div>

  </div>

  <div id="ctrl-bar">
    <button class="ctrl-btn" id="btn-restart" onclick="restartLevel()"></button>
    <button class="ctrl-btn" id="btn-back" onclick="backToEntry()"></button>
  </div>
</div>

<!-- 通关/失败遮罩 -->
<div id="overlay">
  <div class="overlay-box">
    <div class="overlay-title" id="overlay-title"></div>
    <div class="overlay-desc" id="overlay-desc"></div>
    <button class="overlay-btn" id="overlay-btn"></button>
  </div>
</div>

<!-- 知识卡弹窗 -->
<div id="kc-modal">
  <div class="kc-box">
    <div class="kc-header">
      <div class="kc-emoji" id="kc-emoji"></div>
      <div>
        <div class="kc-name" id="kc-name"></div>
        <div class="kc-title" id="kc-title"></div>
      </div>
    </div>
    <div class="kc-intro" id="kc-intro"></div>
    <div class="kc-facts" id="kc-facts"></div>
    <button class="kc-btn" id="kc-btn" onclick="closeKc()"></button>
  </div>
</div>

<!-- 开瓜弹出 -->
<div id="melon-pop">
  <div class="melon-pop-inner">
    <div class="melon-emoji" id="pop-emoji"></div>
    <div class="melon-text" id="pop-text"></div>
    <div class="melon-energy" id="pop-energy"></div>
  </div>
</div>

<!-- 通关庆祝文字 -->
<div id="celebration-text" class="hidden"></div>

<!-- 提示 -->
<div id="toast"></div>

var audioCtx = null;
var musicEnabled = (localStorage.getItem('eatgua_music') === '1');
var bgmAudio = null;

function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function initBgm() {
  if (!bgmAudio) {
    bgmAudio = document.getElementById('bgm-audio');
    if (bgmAudio) {
      bgmAudio.volume = 0.35;
      bgmAudio.loop = true;
    }
  }
}

function tryStartBgm() {
  if (musicEnabled) {
    initBgm();
    if (bgmAudio && bgmAudio.paused) {
      bgmAudio.play().catch(function(){});
    }
  }
}

function toggleMusic() {
  initAudio();
  initBgm();
  musicEnabled = !musicEnabled;
  localStorage.setItem('eatgua_music', musicEnabled ? '1' : '0');
  if (musicEnabled && bgmAudio) {
    bgmAudio.play().catch(function(){});
  } else if (bgmAudio) {
    bgmAudio.pause();
  }
  updateMusicButton();
}

function updateMusicButton() {
  var btn = document.getElementById('music-btn');
  if (musicEnabled) {
    btn.innerHTML = '\u{1F3B5}';
    btn.classList.add('active');
    btn.title = t('musicOff');
  } else {
    btn.innerHTML = '\u{1F507}';
    btn.classList.remove('active');
    btn.title = t('musicOn');
  }
}

function playLevelCompleteSound() {
  if (!audioCtx) return;
  var notes = [523.25, 659.25, 783.99, 1046.50];
  var now = audioCtx.currentTime;
  for (var i = 0; i < notes.length; i++) {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = notes[i];
    gain.gain.setValueAtTime(0, now + i * 0.12);
    gain.gain.linearRampToValueAtTime(0.18, now + i * 0.12 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.5);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now + i * 0.12);
    osc.stop(now + i * 0.12 + 0.5);
  }
}

  var container = document.getElementById('maze-3d');

  renderer3D.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer3D.domElement);

  var dirLight = new THREE.DirectionalLight(0xffffff, 0.75);
  dirLight.position.set(30, 50, 15);

  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;

function resize3D() {
  if (!renderer3D) return;
  // 动态视野：根据迷宫尺寸调整
  var worldSize = Math.max(G.cols || 10, G.rows || 10) * CELL_3D;
  VIEW_SIZE = worldSize + 12;
  var container = document.getElementById('maze-3d');
  var w = Math.min(400, container.clientWidth || 400);
  var h = w;
  renderer3D.setSize(w, h);
  var aspect = w / h;
  camera3D.left = -VIEW_SIZE * aspect / 2;
  camera3D.right = VIEW_SIZE * aspect / 2;
  camera3D.top = VIEW_SIZE / 2;
  camera3D.bottom = -VIEW_SIZE / 2;
  camera3D.updateProjectionMatrix();
}

function buildMaze3D() {
  clearMaze3D();

  // 地面瓦片
  for (var y = 0; y < G.rows; y++) {
    for (var x = 0; x < G.cols; x++) {
      var geo = new THREE.PlaneGeometry(CELL_3D - 0.15, CELL_3D - 0.15);
      var mat = new THREE.MeshStandardMaterial({
        color: 0x080f08,
        roughness: 0.9
      });
      var tile = new THREE.Mesh(geo, mat);
      tile.rotation.x = -Math.PI / 2;
      tile.position.set(x * CELL_3D + CELL_3D/2, 0, y * CELL_3D + CELL_3D/2);
      tile.receiveShadow = true;
      scene3D.add(tile);
      groundTiles3D[x + ',' + y] = tile;
    }
  }

  // 花墙、出口、盲盒
  for (var y = 0; y < G.rows; y++) {
    for (var x = 0; x < G.cols; x++) {
      var cell = G.grid[y][x];
      var key = x + ',' + y;
      var wx = x * CELL_3D + CELL_3D/2;
      var wz = y * CELL_3D + CELL_3D/2;

      if (cell === 1) {
        // 花墙（绿篱）
        var wGeo = new THREE.BoxGeometry(CELL_3D - 0.3, WALL_HEIGHT, CELL_3D - 0.3);
        var wMat = new THREE.MeshStandardMaterial({
          color: 0x2a8b5c,
          roughness: 0.9,
          metalness: 0.0
        });
        // 轻微颜色变化，增加自然感
        var v = (Math.random() - 0.5) * 0.12;
        wMat.color.r = Math.max(0, Math.min(1, wMat.color.r + v));
        wMat.color.g = Math.max(0, Math.min(1, wMat.color.g + v));
        wMat.color.b = Math.max(0, Math.min(1, wMat.color.b + v));

        var wall = new THREE.Mesh(wGeo, wMat);
        wall.position.set(wx, WALL_HEIGHT/2, wz);
        wall.castShadow = true;
        wall.receiveShadow = true;
        wall.visible = false;
        scene3D.add(wall);
        wallMeshes3D[key] = wall;

        // 花墙顶部小花装饰
        if (Math.random() > 0.4) {
          var fGeo = new THREE.SphereGeometry(0.25, 6, 4);
          var fColor = Math.random() > 0.5 ? 0xF0997B : 0xFAC775;
          var fMat = new THREE.MeshStandardMaterial({ color: fColor, roughness: 0.6 });
          var flower = new THREE.Mesh(fGeo, fMat);
          flower.position.set(
            wx + (Math.random() - 0.5) * 2,
            WALL_HEIGHT + 0.15,
            wz + (Math.random() - 0.5) * 2
          );
          flower.castShadow = true;
          flower.visible = false;
          scene3D.add(flower);
          wall.userData.flower = flower;
        }
      }

      if (cell === 3) {
        // 出口传送门
        G.exitGridX = x;
        G.exitGridY = y;
        var rankColor = RANKS[Math.min(G.levelIdx, RANKS.length-1)].color;
        var colorHex = parseInt(rankColor.replace('#', '0x'));
        var eGeo = new THREE.CylinderGeometry(1.4, 1.4, WALL_HEIGHT, 16);
        var eMat = new THREE.MeshStandardMaterial({
          color: colorHex,
          emissive: colorHex,
          emissiveIntensity: 0.6,
          transparent: true,
          opacity: 0.65
        });
        exitMesh3D = new THREE.Mesh(eGeo, eMat);
        exitMesh3D.position.set(wx, WALL_HEIGHT/2, wz);
        exitMesh3D.visible = false;
        scene3D.add(exitMesh3D);

        // 出口光柱
        var beamGeo = new THREE.CylinderGeometry(0.8, 1.4, 8, 16);
        var beamMat = new THREE.MeshBasicMaterial({
          color: colorHex,
          transparent: true,
          opacity: 0.12
        });
        var beam = new THREE.Mesh(beamGeo, beamMat);
        beam.position.set(wx, 5, wz);
        beam.visible = false;
        scene3D.add(beam);
        exitMesh3D.userData.beam = beam;
      }

      if (G.melons[key]) {
        // 盲盒（金色浮空方块）
        var mGeo = new THREE.BoxGeometry(1.4, 1.4, 1.4);
        var mMat = new THREE.MeshStandardMaterial({
          color: 0xBA7517,
          emissive: 0x331100,
          roughness: 0.4,
          metalness: 0.3
        });
        var melon = new THREE.Mesh(mGeo, mMat);
        melon.position.set(wx, 1.6, wz);
        melon.castShadow = true;
        melon.visible = false;
        melon.userData = {
          phase: Math.random() * Math.PI * 2,
          melonKey: G.melons[key],
          key: key
        };
        scene3D.add(melon);
        melonMeshes3D[key] = melon;
      }
    }
  }

  // 玩家角色
  playerGroup3D = new THREE.Group();

  var bodyGeo = new THREE.SphereGeometry(1.1, 16, 12);
  var bodyMat = new THREE.MeshStandardMaterial({ color: 0xD85A30, roughness: 0.6 });
  var body = new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow = true;
  playerGroup3D.add(body);

  var headGeo = new THREE.SphereGeometry(0.65, 12, 10);
  var headMat = new THREE.MeshStandardMaterial({ color: 0x444441, roughness: 0.7 });
  var head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.3;
  head.castShadow = true;
  playerGroup3D.add(head);

  // 眼睛
  var eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
  var eyePupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
  var eyeWhiteGeo = new THREE.SphereGeometry(0.18, 8, 6);
  var eyePupilGeo = new THREE.SphereGeometry(0.09, 6, 4);

  var leftEye = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
  leftEye.position.set(-0.28, 1.4, 0.55);
  playerGroup3D.add(leftEye);

  var rightEye = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
  rightEye.position.set(0.28, 1.4, 0.55);
  playerGroup3D.add(rightEye);

  var leftPupil = new THREE.Mesh(eyePupilGeo, eyePupilMat);
  leftPupil.position.set(-0.28, 1.4, 0.72);
  playerGroup3D.add(leftPupil);

  var rightPupil = new THREE.Mesh(eyePupilGeo, eyePupilMat);
  rightPupil.position.set(0.28, 1.4, 0.72);
  playerGroup3D.add(rightPupil);

  // 小帽子
  var hatGeo = new THREE.ConeGeometry(0.7, 0.7, 8);
  var hatMat = new THREE.MeshStandardMaterial({ color: 0xD85A30, roughness: 0.5 });
  var hat = new THREE.Mesh(hatGeo, hatMat);
  hat.position.y = 2.2;
  hat.castShadow = true;
  playerGroup3D.add(hat);

  playerTargetX3D = G.playerX * CELL_3D + CELL_3D/2;
  playerTargetZ3D = G.playerY * CELL_3D + CELL_3D/2;
  playerGroup3D.position.set(playerTargetX3D, 0, playerTargetZ3D);
  scene3D.add(playerGroup3D);

  // 雷达球（苦瓜buff时显示）
  var rGeo = new THREE.SphereGeometry(CELL_3D * 4, 16, 12);
  var rMat = new THREE.MeshBasicMaterial({
    color: 0xFAC775,
    transparent: true,
    opacity: 0.08,
    wireframe: true,
    visible: false
  });
  radarSphere3D = new THREE.Mesh(rGeo, rMat);
  scene3D.add(radarSphere3D);

  // 更新地面射线检测平面位置
  if (groundPlane3D) {
    groundPlane3D.position.set((G.cols * CELL_3D) / 2, 0, (G.rows * CELL_3D) / 2);
  }

  // 相机定位（根据迷宫尺寸动态调整角度）
  var centerX = (G.cols * CELL_3D) / 2;
  var centerZ = (G.rows * CELL_3D) / 2;
  var camHeight = Math.max(30, G.rows * CELL_3D * 0.7);
  var camOffset = Math.max(16, G.cols * CELL_3D * 0.4);
  camera3D.position.set(centerX, camHeight, centerZ + camOffset);
  camera3D.lookAt(centerX, 0, centerZ);

  resize3D();
  updateScene3D();
}

function clearMaze3D() {
  function disposeMesh(m) {
    if (!m) return;
    scene3D.remove(m);
    if (m.geometry) m.geometry.dispose();
    if (m.material) m.material.dispose();
    if (m.userData && m.userData.flower) {
      scene3D.remove(m.userData.flower);
      m.userData.flower.geometry.dispose();
      m.userData.flower.material.dispose();
    }
    if (m.userData && m.userData.beam) {
      scene3D.remove(m.userData.beam);
      m.userData.beam.geometry.dispose();
      m.userData.beam.material.dispose();
    }
  }

  for (var key in groundTiles3D) disposeMesh(groundTiles3D[key]);
  groundTiles3D = {};

  for (var key in wallMeshes3D) disposeMesh(wallMeshes3D[key]);
  wallMeshes3D = {};

  for (var key in melonMeshes3D) disposeMesh(melonMeshes3D[key]);
  melonMeshes3D = {};

  disposeMesh(exitMesh3D);
  exitMesh3D = null;

  if (playerGroup3D) {
    scene3D.remove(playerGroup3D);
    playerGroup3D.traverse(function(child) {
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
    playerGroup3D = null;
  }

  if (radarSphere3D) {
    scene3D.remove(radarSphere3D);
    radarSphere3D.geometry.dispose();
    radarSphere3D.material.dispose();
    radarSphere3D = null;
  }

  for (var i = 0; i < highlightMeshes3D.length; i++) {
    scene3D.remove(highlightMeshes3D[i]);
    highlightMeshes3D[i].geometry.dispose();
    highlightMeshes3D[i].material.dispose();
  }
  highlightMeshes3D = [];

  for (var i = 0; i < celebrationParticles3D.length; i++) {
    scene3D.remove(celebrationParticles3D[i]);
    if (celebrationParticles3D[i].geometry) celebrationParticles3D[i].geometry.dispose();
    if (celebrationParticles3D[i].material) celebrationParticles3D[i].material.dispose();
  }
  celebrationParticles3D = [];
}

function updateScene3D() {
  if (!scene3D || !G.grid) return;

  // 迷雾视野：更新地面颜色和物体可见性
  for (var key in groundTiles3D) {
    if (G.explored[key]) {
      groundTiles3D[key].material.color.setHex(0x2a3a2e);
    } else {
      groundTiles3D[key].material.color.setHex(0x080f08);
    }
  }

  for (var key in wallMeshes3D) {
    var vis = !!G.explored[key];
    wallMeshes3D[key].visible = vis;
    if (wallMeshes3D[key].userData.flower) {
      wallMeshes3D[key].userData.flower.visible = vis;
    }
  }

  for (var key in melonMeshes3D) {
    var mVis = !!G.explored[key];
    melonMeshes3D[key].visible = mVis;

    // 雷达状态：盲盒显示瓜果对应颜色
    if (mVis && G.radarTime > 0 && melonMeshes3D[key].userData.melonKey) {
      var mc = MELON_COLORS[melonMeshes3D[key].userData.melonKey];
      if (mc !== undefined) {
        melonMeshes3D[key].material.color.setHex(mc);
        melonMeshes3D[key].material.emissive.setHex(Math.floor(mc * 0.3));
      }
    } else if (mVis) {
      melonMeshes3D[key].material.color.setHex(0xBA7517);
      melonMeshes3D[key].material.emissive.setHex(0x331100);
    }
  }

  // 出口可见性
  if (exitMesh3D && G.exitGridX >= 0) {
    var eVis = !!G.explored[G.exitGridX + ',' + G.exitGridY];
    exitMesh3D.visible = eVis;
    if (exitMesh3D.userData.beam) exitMesh3D.userData.beam.visible = eVis;
  }

  // 玩家目标位置
  if (playerGroup3D) {
    playerTargetX3D = G.playerX * CELL_3D + CELL_3D/2;
    playerTargetZ3D = G.playerY * CELL_3D + CELL_3D/2;
  }

  // 雷达球
  if (radarSphere3D) {
    radarSphere3D.visible = G.radarTime > 0;
    if (radarSphere3D.visible && playerGroup3D) {
      radarSphere3D.position.copy(playerGroup3D.position);
    }
  }

  // 土遁高亮
  updateTunnelHighlight3D();
}

function updateTunnelHighlight3D() {
  for (var i = 0; i < highlightMeshes3D.length; i++) {
    scene3D.remove(highlightMeshes3D[i]);
    highlightMeshes3D[i].geometry.dispose();
    highlightMeshes3D[i].material.dispose();
  }
  highlightMeshes3D = [];

  if (!G.tunnelSelected) return;

  var dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  for (var d = 0; d < dirs.length; d++) {
    var wx = G.playerX + dirs[d][0], wy = G.playerY + dirs[d][1];
    if (wx >= 0 && wx < G.cols && wy >= 0 && wy < G.rows && G.grid[wy][wx] === 1) {
      var geo = new THREE.BoxGeometry(CELL_3D - 0.1, WALL_HEIGHT + 0.3, CELL_3D - 0.1);
      var mat = new THREE.MeshBasicMaterial({
        color: 0xFAC775,
        wireframe: true,
        transparent: true,
        opacity: 0.8
      });
      var mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(wx * CELL_3D + CELL_3D/2, WALL_HEIGHT/2, wy * CELL_3D + CELL_3D/2);
      scene3D.add(mesh);
      highlightMeshes3D.push(mesh);
    }
  }
}

function animate3D() {
  animFrameId3D = requestAnimationFrame(animate3D);
  if (!scene3D || !renderer3D) return;

  var t = Date.now() * 0.001;

  // 玩家平滑移动
  if (playerGroup3D) {
    playerGroup3D.position.x += (playerTargetX3D - playerGroup3D.position.x) * 0.25;
    playerGroup3D.position.z += (playerTargetZ3D - playerGroup3D.position.z) * 0.25;
    // 玩家轻微弹跳
    playerGroup3D.position.y = Math.abs(Math.sin(t * 5)) * 0.12;
  }

  // 盲盒浮动+旋转
  for (var key in melonMeshes3D) {
    var mesh = melonMeshes3D[key];
    if (mesh.visible) {
      mesh.position.y = 1.6 + Math.sin(t * 2 + mesh.userData.phase) * 0.3;
      mesh.rotation.y += 0.02;
      mesh.rotation.x = Math.sin(t * 1.5 + mesh.userData.phase) * 0.12;
    }
  }

  // 出口传送门脉冲
  if (exitMesh3D && exitMesh3D.visible) {
    exitMesh3D.material.opacity = 0.5 + Math.sin(t * 3) * 0.2;
    exitMesh3D.rotation.y += 0.015;
    if (exitMesh3D.userData.beam) {
      exitMesh3D.userData.beam.material.opacity = 0.08 + Math.sin(t * 2) * 0.06;
      exitMesh3D.userData.beam.rotation.y -= 0.01;
    }
  }

  // 雷达球旋转
  if (radarSphere3D && radarSphere3D.visible) {
    radarSphere3D.rotation.y += 0.02;
    radarSphere3D.rotation.x += 0.01;
  }

  // 庆祝粒子
  if (celebration.active) updateCelebration3D();

  renderer3D.render(scene3D, camera3D);
}

// ======================== 3D 通关庆祝 ========================
function startCelebration3D() {
  if (!playerGroup3D) return;

  var colors = [0x5DCAA5, 0xFAC775, 0xF0997B, 0xD85A30, 0x97C459, 0xffffff, 0xBA7517];
  var px = playerGroup3D.position.x;
  var py = 3;
  var pz = playerGroup3D.position.z;

  for (var i = 0; i < 80; i++) {
    var angle = (Math.PI * 2 * i) / 80 + (Math.random() - 0.5) * 0.8;
    var speed = 0.12 + Math.random() * 0.3;

    var isBox = Math.random() > 0.5;
    var geo = isBox
      ? new THREE.BoxGeometry(0.3, 0.2, 0.3)
      : new THREE.SphereGeometry(0.22, 6, 4);
    var mat = new THREE.MeshBasicMaterial({
      color: colors[Math.floor(Math.random() * colors.length)],
      transparent: true,
      opacity: 1.0
    });

    var particle = new THREE.Mesh(geo, mat);
    particle.position.set(px + (Math.random()-0.5)*2, py, pz + (Math.random()-0.5)*2);
    particle.userData = {
      vx: Math.cos(angle) * speed,
      vy: 0.15 + Math.random() * 0.25,
      vz: Math.sin(angle) * speed,
      life: 1.0
    };
    scene3D.add(particle);
    celebrationParticles3D.push(particle);
  }
}

function updateCelebration3D() {
  var elapsed = (Date.now() - celebration.startTime) / 1000;

  for (var i = 0; i < celebrationParticles3D.length; i++) {
    var p = celebrationParticles3D[i];
    if (p.userData.life <= 0) continue;

    p.position.x += p.userData.vx;
    p.position.y += p.userData.vy;
    p.position.z += p.userData.vz;
    p.userData.vy -= 0.012;
    p.userData.vx *= 0.99;
    p.userData.vz *= 0.99;
    p.rotation.x += 0.1;
    p.rotation.y += 0.1;

    p.userData.life = Math.max(0, 1 - elapsed / 2.5);
    p.material.opacity = p.userData.life;
    p.scale.setScalar(Math.max(0.01, p.userData.life));
  }
}

function cleanupCelebration3D() {
  for (var i = 0; i < celebrationParticles3D.length; i++) {
    scene3D.remove(celebrationParticles3D[i]);
    if (celebrationParticles3D[i].geometry) celebrationParticles3D[i].geometry.dispose();
    if (celebrationParticles3D[i].material) celebrationParticles3D[i].material.dispose();
  }
  celebrationParticles3D = [];
}

// ======================== 3D 输入 ========================
function getGridFromMouse3D(clientX, clientY) {
  if (!renderer3D || !camera3D) return null;

  var rect = renderer3D.domElement.getBoundingClientRect();
  var x = ((clientX - rect.left) / rect.width) * 2 - 1;
  var y = -((clientY - rect.top) / rect.height) * 2 + 1;

  mouse3D.x = x;
  mouse3D.y = y;
  raycaster3D.setFromCamera(mouse3D, camera3D);

  var intersects = raycaster3D.intersectObject(groundPlane3D);
  if (intersects.length > 0) {
    var point = intersects[0].point;
    var gx = Math.floor(point.x / CELL_3D);
    var gy = Math.floor(point.z / CELL_3D);
    if (gx >= 0 && gx < G.cols && gy >= 0 && gy < G.rows) {
      return { x: gx, y: gy };
    }
  }
  return null;
}

function on3DClick(e) {
  if (G.paused || celebration.active) return;
  var grid = getGridFromMouse3D(e.clientX, e.clientY);
  if (!grid) return;

  if (G.tunnelSelected) {
    tryTunnel(grid.x, grid.y);
  } else {
    var dx = grid.x - G.playerX, dy = grid.y - G.playerY;
    if (Math.abs(dx) > Math.abs(dy)) {
      tryMove(dx > 0 ? 1 : -1, 0);
    } else if (dy !== 0) {
      tryMove(0, dy > 0 ? 1 : -1);
    }
  }
}

var touchStart3D = null;
function on3DTouchStart(e) {
  e.preventDefault();
  touchStart3D = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}

function on3DTouchEnd(e) {
  e.preventDefault();
  if (!touchStart3D || G.paused || celebration.active) return;
  var touch = e.changedTouches[0];
  var dx = touch.clientX - touchStart3D.x;
  var dy = touch.clientY - touchStart3D.y;
  var threshold = 20;

  if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) {
    // 轻触 = 点击
    var grid = getGridFromMouse3D(touch.clientX, touch.clientY);
    if (grid) {
      if (G.tunnelSelected) {
        tryTunnel(grid.x, grid.y);
      } else {
        var mdx = grid.x - G.playerX, mdy = grid.y - G.playerY;
        if (Math.abs(mdx) > Math.abs(mdy)) {
          tryMove(mdx > 0 ? 1 : -1, 0);
        } else if (mdy !== 0) {
          tryMove(0, mdy > 0 ? 1 : -1);
        }
      }
    }
  } else {
    // 滑动
    if (Math.abs(dx) > Math.abs(dy)) {
      tryMove(dx > 0 ? 1 : -1, 0);
    } else {
      tryMove(0, dy > 0 ? 1 : -1);
    }
  }
  touchStart3D = null;
}

// ======================== 通关庆祝动画 ========================
var celebration = { active:false, startTime:0 };

function startCelebration() {
  celebration.active = true;
  celebration.startTime = Date.now();

  // HTML文字动画
  var textEl = document.getElementById('celebration-text');
  textEl.textContent = t('overlayClear');
  textEl.classList.remove('hidden', 'show');
  void textEl.offsetWidth;
  textEl.classList.add('show');

  // 3D粒子礼花
  startCelebration3D();

  playLevelCompleteSound();

  setTimeout(function() {
    celebration.active = false;
    textEl.classList.add('hidden');
    textEl.classList.remove('show');
    cleanupCelebration3D();
    showOverlay();
  }, 2500);
}

// ======================== 初始化 ========================
function init() {
  G.unlockedLevels = parseInt(localStorage.getItem('eatgua_unlocked') || '1');
  init3D();
  updateLangButtons();
  applyI18n();
  updateMusicButton();
  window.addEventListener('resize', function() { resize3D(); });
}

function renderLevelSelect() {
  var list = document.getElementById('level-select-list');
  list.innerHTML = '';
  for (var i = 0; i < LEVELS.length; i++) {
    var locked = i >= G.unlockedLevels;
    var btn = document.createElement('button');
    btn.className = 'level-btn' + (locked ? ' locked' : '');
    var lvName = tl(i, 'name');
    var lvDesc = tl(i, 'desc');
    btn.innerHTML = '<div><div>' + t('levelPrefix') + (i+1) + t('levelSuffix') + ' \u00B7 ' + lvName + '</div>' +
      '<div class="level-btn-desc">' + (locked ? t('locked') : lvDesc) + '</div></div>';
    if (!locked) {
      btn.onclick = (function(idx){ return function(){ startLevel(idx); }; })(i);
    }
    list.appendChild(btn);
  }
}

function startLevel(idx) {
  tryStartBgm();
  G.levelIdx = idx;
  var level = LEVELS[idx];
  G.grid = level.grid.map(function(row){ return row.slice(); });
  G.cols = G.grid[0].length;
  G.rows = G.grid.length;
  G.energy = 12 + idx * 6;
  G.explored = {};
  G.melons = {};
  G.collected = {};
  G.tunnelSelected = false;
  G.radarTime = 0;
  G.startTime = Date.now();
  G.paused = false;
  G.exitGridX = -1;
  G.exitGridY = -1;
  celebration.active = false;
  cleanupCelebration3D();

  for (var y = 0; y < G.rows; y++) {
    for (var x = 0; x < G.cols; x++) {
      if (G.grid[y][x] === 4) {
        G.playerX = x; G.playerY = y;
        G.grid[y][x] = 0;
      } else if (G.grid[y][x] === 2) {
        G.melons[x + ',' + y] = randomMelon();
        G.grid[y][x] = 0;
      }
    }
  }

  updateExplored();

  document.getElementById('entry-screen').classList.add('hidden');
  document.getElementById('game-wrap').classList.remove('hidden');
  document.getElementById('lv-display').textContent = t('levelPrefix') + (idx+1) + t('levelSuffix');

  buildMaze3D();
  updateUI();
  startGameLoop();
}

function randomMelon() {
  var total = 0;
  for (var i = 0; i < MELON_KEYS.length; i++) total += MELON_BASE[MELON_KEYS[i]].prob;
  var r = Math.random() * total;
  var acc = 0;
  for (var i = 0; i < MELON_KEYS.length; i++) {
    acc += MELON_BASE[MELON_KEYS[i]].prob;
    if (r < acc) return MELON_KEYS[i];
  }
  return MELON_KEYS[0];
}

// ======================== 视野 ========================
function updateExplored() {
  var radius = G.radarTime > 0 ? 4 : 2;
  for (var dy = -radius; dy <= radius; dy++) {
    for (var dx = -radius; dx <= radius; dx++) {
      var nx = G.playerX + dx, ny = G.playerY + dy;
      if (nx >= 0 && nx < G.cols && ny >= 0 && ny < G.rows) {
        if (dx*dx + dy*dy <= radius*radius) {
          G.explored[nx + ',' + ny] = true;
        }
      }
    }
  }
}

// ======================== 移动 ========================
function tryMove(dx, dy) {
  if (G.paused) return;
  var nx = G.playerX + dx, ny = G.playerY + dy;
  if (nx < 0 || nx >= G.cols || ny < 0 || ny >= G.rows) return;

  if (G.grid[ny][nx] === 1) {
    showToast(t('toastWall'));
    return;
  }

  if (G.energy < 0.5) {
    showToast(t('toastNoEnergy'));
    return;
  }

  G.playerX = nx; G.playerY = ny;
  G.energy -= 0.5;
  if (G.energy < 0) G.energy = 0;

  updateExplored();

  var key = nx + ',' + ny;
  if (G.melons[key]) {
    eatMelon(G.melons[key], nx, ny);
    delete G.melons[key];
  }

  if (G.grid[ny][nx] === 3) {
    levelComplete();
    return;
  }

  updateUI();
  render();
}

function eatMelon(melonKey, x, y) {
  G.collected[melonKey] = true;
  var base = MELON_BASE[melonKey];

  if (melonKey === 'bitter') {
    G.radarTime = 5;
    showMelonPop(melonKey, t('bitterBuff'));
    setTimeout(function(){ G.radarTime = 0; render(); }, 5000);
    updateExplored();
  } else {
    G.energy += base.energy;
    var maxE = RANKS[Math.min(G.levelIdx, RANKS.length-1)].maxEnergy;
    if (G.energy > maxE) G.energy = maxE;
    showMelonPop(melonKey, t('energyPlus') + base.energy + t('energyUnit'));
  }

  var collectedCount = Object.keys(G.collected).length;
  if (collectedCount <= 7 && !localStorage.getItem('eatgua_kc_' + melonKey)) {
    localStorage.setItem('eatgua_kc_' + melonKey, '1');
    setTimeout(function(){ showKnowledgeCard(melonKey); }, 800);
  }
}

// ======================== 土遁术 ========================
function toggleTunnel() {
  if (G.energy < 5) {
    showToast(t('toastTunnelNoEnergy'));
    return;
  }
  G.tunnelSelected = !G.tunnelSelected;
  var btn = document.getElementById('skill-tunnel');
  if (G.tunnelSelected) {
    btn.classList.add('active');
    btn.style.background = 'rgba(215,175,23,0.2)';
    showToast(t('toastTunnelReady'));
  } else {
    btn.classList.remove('active');
    btn.style.background = 'rgba(15,40,20,0.6)';
  }
  render();
}

function tryTunnel(tx, ty) {
  if (!G.tunnelSelected) return false;
  var dx = Math.abs(tx - G.playerX);
  var dy = Math.abs(ty - G.playerY);
  if (dx + dy !== 1) return false;
  if (G.grid[ty][tx] !== 1) return false;

  if (G.energy < 5) {
    showToast(t('toastNoEnergy'));
    G.tunnelSelected = false;
    document.getElementById('skill-tunnel').classList.remove('active');
    document.getElementById('skill-tunnel').style.background = 'rgba(15,40,20,0.6)';
    return false;
  }

  G.energy -= 5;
  G.playerX = tx; G.playerY = ty;
  G.grid[ty][tx] = 0;
  G.tunnelSelected = false;
  document.getElementById('skill-tunnel').classList.remove('active');
  document.getElementById('skill-tunnel').style.background = 'rgba(15,40,20,0.6)';
  updateExplored();
  showToast(t('toastTunnelUsed'));

  var key = tx + ',' + ty;
  if (G.melons[key]) {
    eatMelon(G.melons[key], tx, ty);
    delete G.melons[key];
  }

  if (G.grid[ty][tx] === 3) {
    levelComplete();
    return true;
  }

  updateUI();
  render();
  return true;
}

// ======================== 渲染（3D场景更新） ========================
function render() {
  updateScene3D();
}

// ======================== 游戏循环 ========================
function startGameLoop() {
  if (animFrameId3D) cancelAnimationFrame(animFrameId3D);
  animate3D();
}

// ======================== UI更新 ========================
function updateUI() {
  var maxE = RANKS[Math.min(G.levelIdx, RANKS.length-1)].maxEnergy;
  document.getElementById('energy-display').textContent = Math.floor(G.energy) + '/' + maxE;
  document.getElementById('energy-bar').style.width = (G.energy / maxE * 100) + '%';
  document.getElementById('rank-display').textContent = tr(G.levelIdx);
  document.getElementById('melon-count').textContent = Object.keys(G.collected).length + '/7';
  document.getElementById('skill-tunnel').disabled = G.energy < 5;
}

// ======================== 通关 ========================
function levelComplete() {
  G.paused = true;
  if (G.levelIdx + 1 >= G.unlockedLevels && G.levelIdx + 1 < LEVELS.length) {
    G.unlockedLevels = G.levelIdx + 2;
    localStorage.setItem('eatgua_unlocked', G.unlockedLevels);
  }
  startCelebration();
}

function showOverlay() {
  var time = Math.floor((Date.now() - G.startTime) / 1000);
  var collected = Object.keys(G.collected).length;
  var isLast = G.levelIdx >= LEVELS.length - 1;

  document.getElementById('overlay-title').textContent = t('overlayClear');
  document.getElementById('overlay-title').style.color = RANKS[Math.min(G.levelIdx, RANKS.length-1)].color;
  document.getElementById('overlay-desc').innerHTML =
    t('overlayTime') + '\uFF1A' + time + t('overlayTimeUnit') + '<br>' +
    t('overlayCollected') + '\uFF1A' + collected + t('overlayCollectedUnit') + '<br>' +
    t('overlayEnergyLeft') + '\uFF1A' + Math.floor(G.energy);

  var ob = document.getElementById('overlay-btn');
  if (isLast) {
    ob.textContent = t('btnBack');
    ob.style.background = '#1D9E75';
    ob.onclick = function(){ backToEntry(); };
  } else {
    ob.textContent = t('btnNext');
    ob.style.background = '#1D9E75';
    ob.onclick = function(){ nextLevel(); };
  }
  document.getElementById('overlay').classList.add('show');
}

function nextLevel() {
  document.getElementById('overlay').classList.remove('show');
  startLevel(G.levelIdx + 1);
}

function restartLevel() {
  startLevel(G.levelIdx);
}

function backToEntry() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('game-wrap').classList.add('hidden');
  document.getElementById('entry-screen').classList.remove('hidden');
  if (animFrameId3D) cancelAnimationFrame(animFrameId3D);
  clearMaze3D();
  renderLevelSelect();
}

// ======================== 知识卡 ========================
function showKnowledgeCard(melonKey) {
  document.getElementById('kc-emoji').textContent = MELON_BASE[melonKey].emoji;
  document.getElementById('kc-name').textContent = tm(melonKey, 'name');
  document.getElementById('kc-title').textContent = tm(melonKey, 'title');
  document.getElementById('kc-intro').textContent = tm(melonKey, 'intro');
  document.getElementById('kc-facts').textContent = tm(melonKey, 'facts');
  document.getElementById('kc-modal').classList.add('show');
  G.paused = true;
}

function closeKc() {
  document.getElementById('kc-modal').classList.remove('show');
  G.paused = false;
}

// ======================== 开瓜弹出 ========================
function showMelonPop(melonKey, text) {
  document.getElementById('pop-emoji').textContent = MELON_BASE[melonKey].emoji;
  document.getElementById('pop-text').textContent = tm(melonKey, 'name');
  document.getElementById('pop-text').style.color = melonKey === 'bitter' ? '#97C459' : '#FAC775';
  document.getElementById('pop-energy').textContent = text;
  document.getElementById('pop-energy').style.color = melonKey === 'bitter' ? '#97C459' : '#5DCAA5';
  var pop = document.getElementById('melon-pop');
  pop.classList.remove('show');
  void pop.offsetWidth;
  pop.classList.add('show');
  setTimeout(function(){ pop.classList.remove('show'); }, 1200);
}

// ======================== 提示 ========================
var toastTimer = null;
function showToast(msg) {
  var tt = document.getElementById('toast');
  tt.textContent = msg;
  tt.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ tt.classList.remove('show'); }, 2000);
}

// ======================== 键盘输入 ========================
document.addEventListener('keydown', function(e) {
  if (document.getElementById('game-wrap').classList.contains('hidden')) return;
  if (document.getElementById('kc-modal').classList.contains('show')) return;
  if (document.getElementById('overlay').classList.contains('show')) return;
  if (celebration.active) return;
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': tryMove(0,-1); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': tryMove(0,1); e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': tryMove(-1,0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': tryMove(1,0); e.preventDefault(); break;
    case 't': case 'T': toggleTunnel(); break;
  }
});

// ======================== 启动 ========================
init();
</script>
</body>
