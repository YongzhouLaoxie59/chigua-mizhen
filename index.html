function clearMaze3D() {
  function disposeMesh(m) {
    if (!m) return;
    scene3D.remove(m);
    if (m.geometry) m.geometry.dispose();
    if (m.material) m.material.dispose();
    if (m.userData && m.userData.flower) {
      scene3D.remove(m.userData.flower);
      m.userData.flower.geometry.dispose();
      m.userData.flower.material.dispose();
    }
    if (m.userData && m.userData.beam) {
      scene3D.remove(m.userData.beam);
      m.userData.beam.geometry.dispose();
      m.userData.beam.material.dispose();
    }
  }

  for (var key in groundTiles3D) disposeMesh(groundTiles3D[key]);
  groundTiles3D = {};

  for (var key in wallMeshes3D) disposeMesh(wallMeshes3D[key]);
  wallMeshes3D = {};

  for (var key in melonMeshes3D) disposeMesh(melonMeshes3D[key]);
  melonMeshes3D = {};

  for (var key in rawMelonMeshes3D) disposeMesh(rawMelonMeshes3D[key]);
  rawMelonMeshes3D = {};

  disposeMesh(exitMesh3D);
  exitMesh3D = null;

  if (playerGroup3D) {
    scene3D.remove(playerGroup3D);
    playerGroup3D.traverse(function(child) {
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    });
    playerGroup3D = null;
  }

  if (radarSphere3D) {
    scene3D.remove(radarSphere3D);
    radarSphere3D.geometry.dispose();
    radarSphere3D.material.dispose();
    radarSphere3D = null;
  }

  for (var i = 0; i < highlightMeshes3D.length; i++) {
    scene3D.remove(highlightMeshes3D[i]);
    highlightMeshes3D[i].geometry.dispose();
    highlightMeshes3D[i].material.dispose();
  }
  highlightMeshes3D = [];

  for (var i = 0; i < celebrationParticles3D.length; i++) {
    scene3D.remove(celebrationParticles3D[i]);
    if (celebrationParticles3D[i].geometry) celebrationParticles3D[i].geometry.dispose();
    if (celebrationParticles3D[i].material) celebrationParticles3D[i].material.dispose();
  }
  celebrationParticles3D = [];

  for (var key in portalMeshes3D) {
    if (portalMeshes3D[key].ring) disposeMesh(portalMeshes3D[key].ring);
    if (portalMeshes3D[key].glow) disposeMesh(portalMeshes3D[key].glow);
  }
  portalMeshes3D = {};
  portalPairs = {};
}

function updateScene3D() {
  if (!scene3D || !G.grid) return;

  // 迷雾视野：更新地面颜色和物体可见性
  for (var key in groundTiles3D) {
    if (G.explored[key]) {
      groundTiles3D[key].material.color.setHex(0x2a3a2e);
    } else {
      groundTiles3D[key].material.color.setHex(0x080f08);
    }
  }

  for (var key in wallMeshes3D) {
    var vis = !!G.explored[key];
    wallMeshes3D[key].visible = vis;
    if (wallMeshes3D[key].userData.flower) {
      wallMeshes3D[key].userData.flower.visible = vis;
    }
  }

  for (var key in melonMeshes3D) {
    var mVis = !!G.explored[key];
    melonMeshes3D[key].visible = mVis;

    // 雷达状态：盲盒显示瓜果对应颜色
    if (mVis && G.radarTime > 0 && melonMeshes3D[key].userData.melonKey) {
      var mc = MELON_COLORS[melonMeshes3D[key].userData.melonKey];
      if (mc !== undefined) {
        melonMeshes3D[key].material.color.setHex(mc);
        melonMeshes3D[key].material.emissive.setHex(Math.floor(mc * 0.3));
      }
    } else if (mVis) {
      melonMeshes3D[key].material.color.setHex(0xBA7517);
      melonMeshes3D[key].material.emissive.setHex(0x331100);
    }
  }

  // 出口可见性
  if (exitMesh3D && G.exitGridX >= 0) {
    var eVis = !!G.explored[G.exitGridX + ',' + G.exitGridY];
    exitMesh3D.visible = eVis;
    if (exitMesh3D.userData.beam) exitMesh3D.userData.beam.visible = eVis;
  }

  // 传送门可见性
  for (var key in portalMeshes3D) {
    var pVis = !!G.explored[key];
    if (portalMeshes3D[key].ring) portalMeshes3D[key].ring.visible = pVis;
    if (portalMeshes3D[key].glow) portalMeshes3D[key].glow.visible = pVis;
  }

  // 生瓜蛋子可见性
  for (var key in rawMelonMeshes3D) {
    rawMelonMeshes3D[key].visible = !!G.explored[key];
  }

  // 玩家目标位置
  if (playerGroup3D) {
    playerTargetX3D = G.playerX * CELL_3D + CELL_3D/2;
    playerTargetZ3D = G.playerY * CELL_3D + CELL_3D/2;
  }

  // 雷达球
  if (radarSphere3D) {
    radarSphere3D.visible = G.radarTime > 0;
    if (radarSphere3D.visible && playerGroup3D) {
      radarSphere3D.position.copy(playerGroup3D.position);
    }
  }

  // 缩骨功高亮
  updateTunnelHighlight3D();
}

function updateTunnelHighlight3D() {
  for (var i = 0; i < highlightMeshes3D.length; i++) {
    scene3D.remove(highlightMeshes3D[i]);
    highlightMeshes3D[i].geometry.dispose();
    highlightMeshes3D[i].material.dispose();
  }
  highlightMeshes3D = [];

  if (!G.activeSkill) return;

  var skillColors = { tunnel:0xFAC775, wood:0x5DCAA5, fire:0xFFD700 };
  var highlightColor = skillColors[G.activeSkill] || 0xFAC775;

  if (G.activeSkill === 'tunnel' || G.activeSkill === 'fire') {
    // 缩骨/点化：高亮相邻花墙
    var dirs = [[0,-1],[0,1],[-1,0],[1,0]];
    for (var d = 0; d < dirs.length; d++) {
      var wx = G.playerX + dirs[d][0], wy = G.playerY + dirs[d][1];
      if (wx >= 0 && wx < G.cols && wy >= 0 && wy < G.rows && G.grid[wy][wx] === 1) {
        var geo = new THREE.BoxGeometry(CELL_3D - 0.1, WALL_HEIGHT + 0.3, CELL_3D - 0.1);
        var mat = new THREE.MeshBasicMaterial({
          color: highlightColor,
          wireframe: true,
          transparent: true,
          opacity: 0.8
        });
        var mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(wx * CELL_3D + CELL_3D/2, WALL_HEIGHT/2, wy * CELL_3D + CELL_3D/2);
        scene3D.add(mesh);
        highlightMeshes3D.push(mesh);
      }
    }
  } else if (G.activeSkill === 'wood') {
    // 飞檐：高亮2格外可跳跃位置
    var jumpDirs = [[0,-2],[0,2],[-2,0],[2,0]];
    for (var d = 0; d < jumpDirs.length; d++) {
      var jx = G.playerX + jumpDirs[d][0], jy = G.playerY + jumpDirs[d][1];
      var midX = G.playerX + jumpDirs[d][0]/2, midY = G.playerY + jumpDirs[d][1]/2;
      if (jx >= 0 && jx < G.cols && jy >= 0 && jy < G.rows &&
          G.grid[midY|0][midX|0] === 1 && G.grid[jy][jx] !== 1) {
        var jgeo = new THREE.BoxGeometry(CELL_3D - 0.1, 0.15, CELL_3D - 0.1);
        var jmat = new THREE.MeshBasicMaterial({
          color: highlightColor,
          transparent: true,
          opacity: 0.6
        });
        var jmesh = new THREE.Mesh(jgeo, jmat);
        jmesh.position.set(jx * CELL_3D + CELL_3D/2, 0.08, jy * CELL_3D + CELL_3D/2);
        scene3D.add(jmesh);
        highlightMeshes3D.push(jmesh);
      }
    }
  }
}

function animate3D() {
  animFrameId3D = requestAnimationFrame(animate3D);
  if (!scene3D || !renderer3D) return;

  var t = Date.now() * 0.001;

  // 玩家平滑移动
  if (playerGroup3D) {
    playerGroup3D.position.x += (playerTargetX3D - playerGroup3D.position.x) * 0.25;
    playerGroup3D.position.z += (playerTargetZ3D - playerGroup3D.position.z) * 0.25;
    // 玩家轻微弹跳
    playerGroup3D.position.y = Math.abs(Math.sin(t * 5)) * 0.12;
  }

  // 盲盒浮动+旋转
  for (var key in melonMeshes3D) {
    var mesh = melonMeshes3D[key];
    if (mesh.visible) {
      mesh.position.y = 1.6 + Math.sin(t * 2 + mesh.userData.phase) * 0.3;
      mesh.rotation.y += 0.02;
      mesh.rotation.x = Math.sin(t * 1.5 + mesh.userData.phase) * 0.12;
    }
  }

  // 生瓜蛋子浮动+旋转
  for (var key in rawMelonMeshes3D) {
    var rMesh = rawMelonMeshes3D[key];
    if (rMesh.visible) {
      rMesh.position.y = 1.4 + Math.sin(t * 2.5 + rMesh.userData.phase) * 0.25;
      rMesh.rotation.y += 0.03;
      rMesh.rotation.x += 0.02;
    }
  }

  // 出口传送门脉冲
  if (exitMesh3D && exitMesh3D.visible) {
    exitMesh3D.material.opacity = 0.5 + Math.sin(t * 3) * 0.2;
    exitMesh3D.rotation.y += 0.015;
    if (exitMesh3D.userData.beam) {
      exitMesh3D.userData.beam.material.opacity = 0.08 + Math.sin(t * 2) * 0.06;
      exitMesh3D.userData.beam.rotation.y -= 0.01;
    }
  }

  // 雷达球旋转
  if (radarSphere3D && radarSphere3D.visible) {
    radarSphere3D.rotation.y += 0.02;
    radarSphere3D.rotation.x += 0.01;
  }

  // 庆祝粒子
  if (celebration.active) updateCelebration3D();

  renderer3D.render(scene3D, camera3D);
}

// ======================== 3D 通关庆祝 ========================
function startCelebration3D() {
  if (!playerGroup3D) return;

  var colors = [0x5DCAA5, 0xFAC775, 0xF0997B, 0xD85A30, 0x97C459, 0xffffff, 0xBA7517];
  var px = playerGroup3D.position.x;
  var py = 3;
  var pz = playerGroup3D.position.z;

  for (var i = 0; i < 80; i++) {
    var angle = (Math.PI * 2 * i) / 80 + (Math.random() - 0.5) * 0.8;
    var speed = 0.12 + Math.random() * 0.3;

    var isBox = Math.random() > 0.5;
    var geo = isBox
      ? new THREE.BoxGeometry(0.3, 0.2, 0.3)
      : new THREE.SphereGeometry(0.22, 6, 4);
    var mat = new THREE.MeshBasicMaterial({
      color: colors[Math.floor(Math.random() * colors.length)],
      transparent: true,
      opacity: 1.0
    });

    var particle = new THREE.Mesh(geo, mat);
    particle.position.set(px + (Math.random()-0.5)*2, py, pz + (Math.random()-0.5)*2);
    particle.userData = {
      vx: Math.cos(angle) * speed,
      vy: 0.15 + Math.random() * 0.25,
      vz: Math.sin(angle) * speed,
      life: 1.0
    };
    scene3D.add(particle);
    celebrationParticles3D.push(particle);
  }
}

function updateCelebration3D() {
  var elapsed = (Date.now() - celebration.startTime) / 1000;

  for (var i = 0; i < celebrationParticles3D.length; i++) {
    var p = celebrationParticles3D[i];
    if (p.userData.life <= 0) continue;

    p.position.x += p.userData.vx;
    p.position.y += p.userData.vy;
    p.position.z += p.userData.vz;
    p.userData.vy -= 0.012;
    p.userData.vx *= 0.99;
    p.userData.vz *= 0.99;
    p.rotation.x += 0.1;
    p.rotation.y += 0.1;

    p.userData.life = Math.max(0, 1 - elapsed / 2.5);
    p.material.opacity = p.userData.life;
    p.scale.setScalar(Math.max(0.01, p.userData.life));
  }
}

function cleanupCelebration3D() {
  for (var i = 0; i < celebrationParticles3D.length; i++) {
    scene3D.remove(celebrationParticles3D[i]);
    if (celebrationParticles3D[i].geometry) celebrationParticles3D[i].geometry.dispose();
    if (celebrationParticles3D[i].material) celebrationParticles3D[i].material.dispose();
  }
  celebrationParticles3D = [];
}

// ======================== 3D 输入 ========================
function getGridFromMouse3D(clientX, clientY) {
  if (!renderer3D || !camera3D) return null;

  var rect = renderer3D.domElement.getBoundingClientRect();
  var x = ((clientX - rect.left) / rect.width) * 2 - 1;
  var y = -((clientY - rect.top) / rect.height) * 2 + 1;

  mouse3D.x = x;
  mouse3D.y = y;
  raycaster3D.setFromCamera(mouse3D, camera3D);

  var intersects = raycaster3D.intersectObject(groundPlane3D);
  if (intersects.length > 0) {
    var point = intersects[0].point;
    var gx = Math.floor(point.x / CELL_3D);
    var gy = Math.floor(point.z / CELL_3D);
    if (gx >= 0 && gx < G.cols && gy >= 0 && gy < G.rows) {
      return { x: gx, y: gy };
    }
  }
  return null;
}

function on3DClick(e) {
  if (G.paused || celebration.active) return;
  var grid = getGridFromMouse3D(e.clientX, e.clientY);
  if (!grid) return;

  if (G.activeSkill === 'tunnel') {
    tryTunnel(grid.x, grid.y);
  } else if (G.activeSkill === 'wood') {
    tryWood(grid.x, grid.y);
  } else if (G.activeSkill === 'fire') {
    tryFire(grid.x, grid.y);
  } else {
    var dx = grid.x - G.playerX, dy = grid.y - G.playerY;
    if (Math.abs(dx) > Math.abs(dy)) {
      tryMove(dx > 0 ? 1 : -1, 0);
    } else if (dy !== 0) {
      tryMove(0, dy > 0 ? 1 : -1);
    }
  }
}

var touchStart3D = null;
function on3DTouchStart(e) {
  e.preventDefault();
  touchStart3D = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}

function on3DTouchEnd(e) {
  e.preventDefault();
  if (!touchStart3D || G.paused || celebration.active) return;
  var touch = e.changedTouches[0];
  var dx = touch.clientX - touchStart3D.x;
  var dy = touch.clientY - touchStart3D.y;
  var threshold = 20;

  if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) {
    // 轻触 = 点击
    var grid = getGridFromMouse3D(touch.clientX, touch.clientY);
    if (grid) {
      if (G.activeSkill === 'tunnel') {
        tryTunnel(grid.x, grid.y);
      } else if (G.activeSkill === 'wood') {
        tryWood(grid.x, grid.y);
      } else if (G.activeSkill === 'fire') {
        tryFire(grid.x, grid.y);
      } else {
        var mdx = grid.x - G.playerX, mdy = grid.y - G.playerY;
        if (Math.abs(mdx) > Math.abs(mdy)) {
          tryMove(mdx > 0 ? 1 : -1, 0);
        } else if (mdy !== 0) {
          tryMove(0, mdy > 0 ? 1 : -1);
        }
      }
    }
  } else {
    // 滑动
    if (Math.abs(dx) > Math.abs(dy)) {
      tryMove(dx > 0 ? 1 : -1, 0);
    } else {
      tryMove(0, dy > 0 ? 1 : -1);
    }
  }
  touchStart3D = null;
}

// ======================== 通关庆祝动画 ========================
var celebration = { active:false, startTime:0 };

function startCelebration() {
  celebration.active = true;
  celebration.startTime = Date.now();

  // HTML文字动画
  var textEl = document.getElementById('celebration-text');
  textEl.textContent = t('overlayClear');
  textEl.classList.remove('hidden', 'show');
  void textEl.offsetWidth;
  textEl.classList.add('show');

  // 3D粒子礼花
  startCelebration3D();

  playLevelCompleteSound();

  setTimeout(function() {
    celebration.active = false;
    textEl.classList.add('hidden');
    textEl.classList.remove('show');
    cleanupCelebration3D();
    showOverlay();
  }, 2500);
}

// ======================== 初始化 ========================
function init() {
  G.unlockedLevels = parseInt(localStorage.getItem('eatgua_unlocked') || '1');
  init3D();
  updateLangButtons();
  applyI18n();
  updateMusicButton();
  window.addEventListener('resize', function() { resize3D(); });
}

function renderLevelSelect() {
  var list = document.getElementById('level-select-list');
  list.innerHTML = '';
  for (var i = 0; i < LEVELS.length; i++) {
    var locked = i >= G.unlockedLevels;
    var btn = document.createElement('button');
    btn.className = 'level-btn' + (locked ? ' locked' : '');
    var lvName = tl(i, 'name');
    var lvDesc = tl(i, 'desc');
    var starKey = 'eatgua_stars_' + i;
    var savedStars = parseInt(localStorage.getItem(starKey) || '0');
    var starStr = '';
    for (var st = 0; st < 3; st++) starStr += st < savedStars ? '\u2605' : '\u2606';
    btn.innerHTML = '<div><div>' + t('levelPrefix') + (i+1) + t('levelSuffix') + ' \u00B7 ' + lvName +
      (savedStars > 0 ? ' <span class="level-stars">' + starStr + '</span>' : '') + '</div>' +
      '<div class="level-btn-desc">' + (locked ? t('locked') : lvDesc) + '</div></div>';
    if (!locked) {
      btn.onclick = (function(idx){ return function(){ closeLevelSelect(); startLevel(idx); }; })(i);
    }
    list.appendChild(btn);
  }
}

function openLevelSelect() {
  renderLevelSelect();
  document.getElementById('level-select-modal').classList.add('show');
}

function closeLevelSelect() {
  document.getElementById('level-select-modal').classList.remove('show');
}

function startLevel(idx) {
  tryStartBgm();
  G.levelIdx = idx;
  var level = LEVELS[idx];
  G.grid = level.grid.map(function(row){ return row.slice(); });
  G.cols = G.grid[0].length;
  G.rows = G.grid.length;
  G.energy = 12 + idx * 6;
  G.initialEnergy = 12 + idx * 6;
  G.explored = {};
  G.melons = {};
  G.collected = {};
  G.tunnelSelected = false;
  G.activeSkill = null;
  G.radarTime = 0;
  G.visionTime = 0;
  G.moveHistory = [];
  G.fullPath = [];
  G.skillUsed = false;
  G.skillCardsShown = {};
  G.levelCardsShown = {};
  G.burnedWalls = {};
  // 初始化传送门配对
  portalPairs = {};
  var portalCells = [];
  for (var y = 0; y < G.rows; y++) {
    for (var x = 0; x < G.cols; x++) {
      if (G.grid[y][x] === 5) portalCells.push({x:x, y:y});
    }
  }
  for (var i = 0; i < portalCells.length - 1; i += 2) {
    var a = portalCells[i], b = portalCells[i+1];
    portalPairs[a.x + ',' + a.y] = b.x + ',' + b.y;
    portalPairs[b.x + ',' + b.y] = a.x + ',' + a.y;
  }
  G.startTime = Date.now();
  G.paused = false;
  G.exitGridX = -1;
  G.exitGridY = -1;
  celebration.active = false;
  cleanupCelebration3D();

  for (var y = 0; y < G.rows; y++) {
    for (var x = 0; x < G.cols; x++) {
      if (G.grid[y][x] === 4) {
        G.playerX = x; G.playerY = y;
        G.grid[y][x] = 0;
        G.fullPath = [{x:x, y:y}];
      } else if (G.grid[y][x] === 2) {
        G.melons[x + ',' + y] = randomMelon();
        G.grid[y][x] = 0;
      }
    }
  }

  updateExplored();

  document.getElementById('entry-screen').classList.add('hidden');
  document.getElementById('game-wrap').classList.remove('hidden');
  document.getElementById('lv-display').textContent = t('levelPrefix') + (idx+1) + t('levelSuffix');

  buildMaze3D();
  updateUI();
  startGameLoop();
  // 关卡知识卡
  if (!G.levelCardsShown[idx]) {
    G.levelCardsShown[idx] = true;
    setTimeout(function(){ showKc("level_" + idx); }, 1200);
  }
}

function randomMelon() {
  var total = 0;
  for (var i = 0; i < MELON_KEYS.length; i++) total += MELON_BASE[MELON_KEYS[i]].prob;
  var r = Math.random() * total;
  var acc = 0;
  for (var i = 0; i < MELON_KEYS.length; i++) {
    acc += MELON_BASE[MELON_KEYS[i]].prob;
    if (r < acc) return MELON_KEYS[i];
  }
  return MELON_KEYS[0];
}

// ======================== 视野 ========================
function updateExplored() {
  var radius = (G.radarTime > 0 || G.visionTime > 0) ? 999 : 2;
  for (var dy = -radius; dy <= radius; dy++) {
    for (var dx = -radius; dx <= radius; dx++) {
      var nx = G.playerX + dx, ny = G.playerY + dy;
      if (nx >= 0 && nx < G.cols && ny >= 0 && ny < G.rows) {
        if (dx*dx + dy*dy <= radius*radius) {
          G.explored[nx + ',' + ny] = true;
        }
      }
    }
  }
}

// ======================== 生瓜蛋子处理 ========================
function handleRawMelon(key, gx, gy) {
  G.grid[gy][gx] = 0;
  G.energy -= 3;
  if (G.energy < 0) G.energy = 0;
  showToast(t('toastUnripe'));
  if (rawMelonMeshes3D[key]) {
    scene3D.remove(rawMelonMeshes3D[key]);
    rawMelonMeshes3D[key].geometry.dispose();
    rawMelonMeshes3D[key].material.dispose();
    delete rawMelonMeshes3D[key];
  }
  // 选瓜知识卡：首次碰到弹南瓜卡，第三次弹苦瓜卡
  var rawHits = parseInt(localStorage.getItem('eatgua_raw_hits') || '0') + 1;
  localStorage.setItem('eatgua_raw_hits', String(rawHits));
  if (rawHits === 1 && !localStorage.getItem('eatgua_kc_pick_pumpkin')) {
    localStorage.setItem('eatgua_kc_pick_pumpkin', '1');
    setTimeout(function(){ showKc('pick_pumpkin'); }, 800);
  } else if (rawHits >= 3 && !localStorage.getItem('eatgua_kc_pick_bitter')) {
    localStorage.setItem('eatgua_kc_pick_bitter', '1');
    setTimeout(function(){ showKc('pick_bitter'); }, 800);
  }
}

// ======================== 移动 ========================
function tryMove(dx, dy) {
  if (G.paused) return;
  var nx = G.playerX + dx, ny = G.playerY + dy;
  if (nx < 0 || nx >= G.cols || ny < 0 || ny >= G.rows) return;

  if (G.grid[ny][nx] === 1) {
    showToast(t('toastWall'));
    return;
  }

  if (G.energy < 0.5) {
    showToast(t('toastNoEnergy'));
    return;
  }

  G.moveHistory.push({ x: G.playerX, y: G.playerY, energy: G.energy });
  if (G.moveHistory.length > 10) G.moveHistory.shift();
  G.playerX = nx; G.playerY = ny;
  G.fullPath.push({x: nx, y: ny});
  G.energy -= 0.5;
  if (G.energy < 0) G.energy = 0;

  updateExplored();

  var key = nx + ',' + ny;
  if (G.melons[key]) {
    eatMelon(G.melons[key], nx, ny);
    delete G.melons[key];
  }

  // 生瓜蛋子
  if (G.grid[ny][nx] === 6) {
    handleRawMelon(key, nx, ny);
  }

  // 传送门
  if (G.grid[ny][nx] === 5) {
    var destKey = portalPairs[key];
    if (destKey) {
      var parts = destKey.split(',');
      var dx2 = parseInt(parts[0]), dy2 = parseInt(parts[1]);
      G.playerX = dx2; G.playerY = dy2;
      G.fullPath.push({x: dx2, y: dy2});
      updateExplored();
      updateUI();
      render();
      return;
    }
  }

  if (G.grid[ny][nx] === 3) {
    levelComplete();
    return;
  }

  updateUI();
  render();
}

function eatMelon(melonKey, x, y) {
  G.collected[melonKey] = true;
  var base = MELON_BASE[melonKey];

  if (melonKey === 'bitter') {
    G.radarTime = 5;
    showMelonPop(melonKey, t('bitterBuff'));
    setTimeout(function(){ G.radarTime = 0; render(); }, 5000);
    updateExplored();
  } else {
    G.energy += base.energy;
    var maxE = RANKS[Math.min(G.levelIdx, RANKS.length-1)].maxEnergy;
    if (G.energy > maxE) G.energy = maxE;
    showMelonPop(melonKey, t('energyPlus') + base.energy + t('energyUnit'));
  }

  var collectedCount = Object.keys(G.collected).length;
  if (collectedCount <= 7 && !localStorage.getItem('eatgua_kc_' + melonKey)) {
    localStorage.setItem('eatgua_kc_' + melonKey, '1');
    setTimeout(function(){ showKnowledgeCard(melonKey); }, 800);
  }
}

// ======================== 五大奇功 ========================
function toggleSkill(skill) {
  var cfg = SKILL_CONFIG[skill];
  if (!cfg) return;
  if (G.energy < cfg.cost) {
    showToast(t('toast' + skill.charAt(0).toUpperCase() + skill.slice(1) + 'NoEnergy'));
    return;
  }

  // 即时技能（凌波、天眼）直接执行
  if (!cfg.target) {
    if (skill === 'water') { doWaterRecall(); if (!G.skillCardsShown.water) showSkillCard('water'); }
    else if (skill === 'metal') { doMetalVision(); if (!G.skillCardsShown.metal) showSkillCard('metal'); }
    return;
  }

  // 目标技能（缩骨、飞檐、点化）切换选中状态
  G.skillUsed = true;
  if (G.activeSkill === skill) {
    // 取消选中
    G.activeSkill = null;
    clearSkillButtons();
  } else {
    G.activeSkill = skill;
    clearSkillButtons();
    var btn = document.getElementById('skill-' + skill);
    btn.classList.add('active');
    btn.style.background = 'rgba(255,255,255,0.15)';
    var readyKey = 'toast' + skill.charAt(0).toUpperCase() + skill.slice(1) + 'Ready';
    showToast(t(readyKey));
  }
  render();
}

function clearSkillButtons() {
  var skills = ['tunnel', 'wood', 'fire'];
  for (var i = 0; i < skills.length; i++) {
    var btn = document.getElementById('skill-' + skills[i]);
    if (btn) {
      btn.classList.remove('active');
      btn.style.background = 'rgba(15,40,20,0.6)';
    }
  }
}

// 缩骨功：穿墙（墙变路径，移动到墙的位置）
function tryTunnel(tx, ty) {
  if (G.activeSkill !== 'tunnel') return false;
  var dx = Math.abs(tx - G.playerX);
  var dy = Math.abs(ty - G.playerY);
  if (dx + dy !== 1) return false;
  if (G.grid[ty][tx] !== 1) return false;

  G.energy -= 5;
  G.moveHistory.push({ x: G.playerX, y: G.playerY, energy: G.energy });
  if (G.moveHistory.length > 10) G.moveHistory.shift();
  G.playerX = tx; G.playerY = ty;
  G.fullPath.push({x: tx, y: ty});
  G.grid[ty][tx] = 0;
  G.activeSkill = null;
  clearSkillButtons();
  updateExplored();
  showToast(t('toastTunnelUsed'));
  if (!G.skillCardsShown.tunnel) showSkillCard('tunnel');

  var key = tx + ',' + ty;
  if (G.melons[key]) { eatMelon(G.melons[key], tx, ty); delete G.melons[key]; }
  if (G.grid[ty][tx] === 3) { levelComplete(); return true; }

  updateUI();
  render();
  return true;
}

// 飞檐功：跃过相邻花墙到墙后的格子（墙不变）
function tryWood(tx, ty) {
  if (G.activeSkill !== 'wood') return false;
  var dx = tx - G.playerX;
  var dy = ty - G.playerY;
  // 必须是正交方向且距离为2（跳过中间的墙）
  if (Math.abs(dx) === 2 && dy === 0) {
    var midX = G.playerX + dx / 2;
    if (G.grid[G.playerY][midX] !== 1) return false;
    if (G.grid[ty][tx] === 1) { showToast(t('toastWoodBlocked')); return false; }
  } else if (Math.abs(dy) === 2 && dx === 0) {
    var midY = G.playerY + dy / 2;
    if (G.grid[midY][G.playerX] !== 1) return false;
    if (G.grid[ty][tx] === 1) { showToast(t('toastWoodBlocked')); return false; }
  } else {
    return false;
  }

  G.energy -= 3;
  G.moveHistory.push({ x: G.playerX, y: G.playerY, energy: G.energy });
  if (G.moveHistory.length > 10) G.moveHistory.shift();
  G.playerX = tx; G.playerY = ty;
  G.fullPath.push({x: tx, y: ty});
  G.activeSkill = null;
  clearSkillButtons();
  updateExplored();
  showToast(t('toastWoodUsed'));
  if (!G.skillCardsShown.wood) showSkillCard('wood');

  var key = tx + ',' + ty;
  if (G.melons[key]) { eatMelon(G.melons[key], tx, ty); delete G.melons[key]; }

  // 生瓜蛋子
  if (G.grid[ty][tx] === 6) {
    handleRawMelon(key, tx, ty);
  }

  if (G.grid[ty][tx] === 3) { levelComplete(); return true; }

  updateUI();
  render();
  return true;
}

// 凌波步：回溯3步
function doWaterRecall() {
  if (G.moveHistory.length < 1) {
    showToast(t('toastWaterNoHistory'));
    return;
  }
  G.energy -= 4;
  G.skillUsed = true;
  var steps = Math.min(3, G.moveHistory.length);
  var target = G.moveHistory[G.moveHistory.length - steps];
  G.playerX = target.x;
  G.playerY = target.y;
  G.fullPath.push({x: target.x, y: target.y});
  G.energy = Math.min(G.energy + steps * 0.5, RANKS[Math.min(G.levelIdx, RANKS.length - 1)].maxEnergy);
  G.moveHistory = G.moveHistory.slice(0, G.moveHistory.length - steps);
  G.activeSkill = null;
  showToast(t('toastWaterUsed'));
  updateExplored();
  updateUI();
  render();
}

// 天眼通：全图透视5秒
function doMetalVision() {
  G.energy -= 6;
  G.skillUsed = true;
  G.visionTime = 5;
  G.activeSkill = null;
  // 标记所有格子为已探索
  for (var y = 0; y < G.rows; y++) {
    for (var x = 0; x < G.cols; x++) {
      G.explored[x + ',' + y] = true;
    }
  }
  showToast(t('toastMetalUsed'));
  updateUI();
  render();
  setTimeout(function() {
    G.visionTime = 0;
    updateExplored();
    render();
  }, 5000);
}

// 点化功：点化花墙化为花径（永久开通）
function tryFire(tx, ty) {
  if (G.activeSkill !== 'fire') return false;
  var dx = Math.abs(tx - G.playerX);
  var dy = Math.abs(ty - G.playerY);
  if (dx + dy !== 1) return false;
  if (G.grid[ty][tx] !== 1) return false;

  G.energy -= 8;
  G.grid[ty][tx] = 0;
  G.burnedWalls[tx + ',' + ty] = true;
  G.activeSkill = null;
  clearSkillButtons();
  showToast(t('toastFireUsed'));
  if (!G.skillCardsShown.fire) showSkillCard('fire');
  updateUI();
  render();
  return true;
}

// ======================== UI更新 ========================
function updateUI() {
  var maxE = RANKS[Math.min(G.levelIdx, RANKS.length-1)].maxEnergy;
  document.getElementById('lv-display').textContent = t('levelPrefix') + (G.levelIdx+1) + t('levelSuffix');
  // 只显示当前能量值，不显示/最大（避免"开局就有消耗"的错觉）
  document.getElementById('energy-display').textContent = Math.floor(G.energy);
  // 能量条以初始能量为100%基准，这样开局看起来是满的
  document.getElementById('energy-bar').style.width = Math.min(100, G.energy / G.initialEnergy * 100) + '%';
  document.getElementById('rank-display').textContent = tr(G.levelIdx);
  document.getElementById('melon-count').textContent = Object.keys(G.collected).length + '/7';
  document.getElementById('skill-tunnel').disabled = G.energy < 5;
  document.getElementById('skill-wood').disabled = G.energy < 3;
  document.getElementById('skill-water').disabled = G.energy < 4 || G.moveHistory.length < 1;
  document.getElementById('skill-metal').disabled = G.energy < 6;
  document.getElementById('skill-fire').disabled = G.energy < 8;
}

// ======================== 通关 ========================
function levelComplete() {
  G.paused = true;
  if (G.levelIdx + 1 >= G.unlockedLevels && G.levelIdx + 1 < LEVELS.length) {
    G.unlockedLevels = G.levelIdx + 2;
    localStorage.setItem('eatgua_unlocked', G.unlockedLevels);
  }
  startCelebration();
}

function showOverlay() {
  var time = Math.floor((Date.now() - G.startTime) / 1000);
  var collected = Object.keys(G.collected).length;
  var isLast = G.levelIdx >= LEVELS.length - 1;

  // 星级评价
  var energyRatio = G.energy / G.initialEnergy;
  var stars = 1;
  if (energyRatio >= 0.5) stars = 3;
  else if (energyRatio >= 0.25) stars = 2;

  var starHtml = '';
  for (var s = 0; s < 3; s++) {
    starHtml += '<span class="' + (s < stars ? 'star-on' : 'star-off') + '">\u2605</span>';
  }
  document.getElementById('overlay-stars').innerHTML = starHtml;

  // 保存星级
  var starKey = 'eatgua_stars_' + G.levelIdx;
  var prevStars = parseInt(localStorage.getItem(starKey) || '0');
  if (stars > prevStars) localStorage.setItem(starKey, stars.toString());

  document.getElementById('overlay-title').textContent = t('overlayClear');
  document.getElementById('overlay-title').style.color = RANKS[Math.min(G.levelIdx, RANKS.length-1)].color;
  document.getElementById('overlay-desc').innerHTML =
    t('overlayTime') + '\uFF1A' + time + t('overlayTimeUnit') + '<br>' +
    t('overlayCollected') + '\uFF1A' + collected + t('overlayCollectedUnit') + '<br>' +
    t('overlayEnergyLeft') + '\uFF1A' + Math.floor(G.energy);

  // 成就检查
  var achievements = [];
  if (!G.skillUsed) achievements.push(t('achNoSkill'));
  if (collected >= 7) achievements.push(t('achAllCollect'));
  if (time <= 60) achievements.push(t('achSpeedRun'));
  if (energyRatio >= 0.99) achievements.push(t('achFullEnergy'));

  var achEl = document.getElementById('overlay-ach');
  if (achievements.length > 0) {
    achEl.style.display = 'block';
    achEl.innerHTML = '\u2B50 ' + t('achUnlocked') + '\uFF1A' + achievements.join('\u3001');
    // 保存成就
    for (var i = 0; i < achievements.length; i++) {
      var achKey = 'eatgua_ach_' + G.levelIdx + '_' + i;
      localStorage.setItem(achKey, achievements[i]);
    }
  } else {
    achEl.style.display = 'none';
  }

  var ob = document.getElementById('overlay-btn');
  if (isLast) {
    ob.textContent = t('btnBack');
    ob.style.background = '#1D9E75';
    ob.onclick = function(){ backToEntry(); };
  } else {
    ob.textContent = t('btnNext');
    ob.style.background = '#1D9E75';
    ob.onclick = function(){ nextLevel(); };
  }
  document.getElementById('overlay').classList.add('show');
  drawMinimap();
}

function drawMinimap() {
  var canvas = document.getElementById('overlay-minimap');
  var ctx = canvas.getContext('2d');
  var origGrid = LEVELS[G.levelIdx].grid;
  var rows = origGrid.length;
  var cols = origGrid[0].length;
  var maxSize = window.innerWidth < 480 ? 220 : 260;
  var cellSize = Math.floor(Math.min(maxSize / cols, maxSize / rows));
  if (cellSize < 5) cellSize = 5;
  var w = cellSize * cols;
  var h = cellSize * rows;
  canvas.width = w;
  canvas.height = h;

  ctx.clearRect(0, 0, w, h);

  // 背景
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, w, h);

  // 找起点和终点
  var startX = G.fullPath[0] ? G.fullPath[0].x : 0;
  var startY = G.fullPath[0] ? G.fullPath[0].y : 0;
  var exitX = G.exitGridX !== undefined ? G.exitGridX : -1;
  var exitY = G.exitGridY !== undefined ? G.exitGridY : -1;
  if (exitX < 0) {
    for (var sy = 0; sy < rows; sy++) {
      for (var sx = 0; sx < cols; sx++) {
        if (origGrid[sy][sx] === 3) { exitX = sx; exitY = sy; break; }
      }
      if (exitX >= 0) break;
    }
  }

  for (var y = 0; y < rows; y++) {
    for (var x = 0; x < cols; x++) {
      var cell = origGrid[y][x];
      var px = x * cellSize;
      var py = y * cellSize;

      if (cell === 1) {
        ctx.fillStyle = 'rgba(42,139,92,0.35)';
        ctx.fillRect(px, py, cellSize - 1, cellSize - 1);
      } else if (cell === 3) {
        ctx.fillStyle = 'rgba(250,199,117,0.6)';
        ctx.fillRect(px, py, cellSize - 1, cellSize - 1);
      } else if (cell === 4) {
        ctx.fillStyle = 'rgba(93,202,165,0.5)';
        ctx.fillRect(px, py, cellSize - 1, cellSize - 1);
      } else if (cell === 5) {
        ctx.fillStyle = 'rgba(102,136,255,0.35)';
        ctx.fillRect(px, py, cellSize - 1, cellSize - 1);
      } else if (cell === 6) {
        ctx.fillStyle = 'rgba(107,142,35,0.4)';
        ctx.fillRect(px, py, cellSize - 1, cellSize - 1);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.fillRect(px, py, cellSize - 1, cellSize - 1);
      }
    }
  }

  // BFS 最短路径（考虑传送门）
  var shortestLen = -1;
  if (startX >= 0 && startY >= 0 && exitX >= 0) {
    var visited = {};
    var queue = [{x: startX, y: startY, steps: 0}];
    visited[startY + ',' + startX] = true;
    var dirs = [[0,1],[0,-1],[1,0],[-1,0]];
    while (queue.length > 0) {
      var cur = queue.shift();
      if (cur.x === exitX && cur.y === exitY) {
        shortestLen = cur.steps + 1;
        break;
      }
      for (var d = 0; d < dirs.length; d++) {
        var nx = cur.x + dirs[d][0];
        var ny = cur.y + dirs[d][1];
        if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
        if (origGrid[ny][nx] === 1) continue;
        if (visited[ny + ',' + nx]) continue;
        visited[ny + ',' + nx] = true;
        queue.push({x: nx, y: ny, steps: cur.steps + 1});
        // 传送门配对
        if (origGrid[ny][nx] === 5 && portalPairs) {
          var pkey = nx + ',' + ny;
          var pdest = portalPairs[pkey];
          if (pdest) {
            var pcoords = pdest.split(',');
            var dx = parseInt(pcoords[0]), dy = parseInt(pcoords[1]);
            if (!visited[dy + ',' + dx]) {
              visited[dy + ',' + dx] = true;
              queue.push({x: dx, y: dy, steps: cur.steps + 2});
            }
          }
        }
      }
    }
  }

  // 画玩家路径（亮色线条）
  if (G.fullPath.length > 1) {
    ctx.strokeStyle = 'rgba(93,202,165,0.85)';
    ctx.lineWidth = Math.max(2, cellSize * 0.3);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (var i = 0; i < G.fullPath.length; i++) {
      var p = G.fullPath[i];
      var cx = p.x * cellSize + cellSize / 2;
      var cy = p.y * cellSize + cellSize / 2;
      if (i === 0) ctx.moveTo(cx, cy);
      else ctx.lineTo(cx, cy);
    }
    ctx.stroke();
  }

  // 起点标记
  ctx.fillStyle = '#5DCAA5';
  ctx.beginPath();
  ctx.arc(startX * cellSize + cellSize / 2, startY * cellSize + cellSize / 2, Math.max(2, cellSize * 0.25), 0, Math.PI * 2);
  ctx.fill();

  // 终点标记
  if (exitX >= 0) {
    ctx.fillStyle = '#FAC775';
    ctx.beginPath();
    ctx.arc(exitX * cellSize + cellSize / 2, exitY * cellSize + cellSize / 2, Math.max(2, cellSize * 0.25), 0, Math.PI * 2);
    ctx.fill();
  }

  // 更新捷径提示
  var shEl = document.getElementById('overlay-shortest');
  if (shortestLen > 0 && G.fullPath.length > 0) {
    var actualLen = G.fullPath.length;
    if (actualLen <= shortestLen) {
      shEl.textContent = t('overlayShortestPerfect').replace('{N}', actualLen);
      shEl.style.color = 'rgba(93,202,165,0.9)';
    } else {
      shEl.textContent = t('overlayShortestResult').replace('{A}', actualLen).replace('{S}', shortestLen);
      shEl.style.color = 'rgba(250,199,117,0.85)';
    }
  } else {
    shEl.textContent = t('overlayShortest');
    shEl.style.color = 'rgba(250,199,117,0.85)';
  }
}

function nextLevel() {
  document.getElementById('overlay').classList.remove('show');
  startLevel(G.levelIdx + 1);
}

function backToEntry() {
  document.getElementById('overlay').classList.remove('show');

}

// ======================== 瓜果图标绘制（Canvas） ========================
var melonIconCache = {};
function generateMelonIcon(type, size) {
  size = size || 48;
  var cacheKey = type + '_' + size;
  if (melonIconCache[cacheKey]) return melonIconCache[cacheKey];
  var canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  var ctx = canvas.getContext('2d');
  var cx = size / 2, cy = size / 2;
  switch (type) {
    case 'winter': // 冬瓜：圆柱形，浅绿底+白霜粉+短瓜蒂
      // 主体：圆柱形（圆角矩形）
      ctx.fillStyle = '#c8e6c9';
      var winR = size * 0.26;
      ctx.beginPath();
      ctx.moveTo(cx - size * 0.26, size * 0.22 + winR);
      ctx.arcTo(cx - size * 0.26, size * 0.22, cx - size * 0.26 + winR, size * 0.22, winR);
      ctx.lineTo(cx + size * 0.26 - winR, size * 0.22);
      ctx.arcTo(cx + size * 0.26, size * 0.22, cx + size * 0.26, size * 0.22 + winR, winR);
      ctx.lineTo(cx + size * 0.26, size * 0.78 - winR);
      ctx.arcTo(cx + size * 0.26, size * 0.78, cx + size * 0.26 - winR, size * 0.78, winR);
      ctx.lineTo(cx - size * 0.26 + winR, size * 0.78);
      ctx.arcTo(cx - size * 0.26, size * 0.78, cx - size * 0.26, size * 0.78 - winR, winR);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#a5d6a7';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // 白霜（随机白色半透明圆点覆盖表面）
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      var frostSeed = 12345;
      for (var wi = 0; wi < 40; wi++) {
        frostSeed = (frostSeed * 1103515245 + 12345) & 0x7fffffff;
        var wx = (frostSeed % 100) / 100;
        frostSeed = (frostSeed * 1103515245 + 12345) & 0x7fffffff;
        var wy = (frostSeed % 100) / 100;
        var dotX = cx - size * 0.22 + wx * size * 0.44;
        var dotY = size * 0.25 + wy * size * 0.5;
        var dotR = size * 0.02 + (frostSeed % 5) * size * 0.005;
        ctx.beginPath();
        ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
        ctx.fill();
      }
      // 短瓜蒂
      ctx.strokeStyle = '#66bb6a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, size * 0.22);
      ctx.lineTo(cx, size * 0.12);
      ctx.stroke();
      // 蒂头小叶
      ctx.fillStyle = '#7cb342';
      ctx.beginPath();
      ctx.ellipse(cx + 3, size * 0.11, size * 0.05, size * 0.03, 0.5, 0, Math.PI * 2);
      ctx.fill();
      // 拟人：淡定表情 😌
      ctx.strokeStyle = '#33691e';
      ctx.lineWidth = 2;
      // 闭眼弯线
      ctx.beginPath(); ctx.arc(cx - size*0.1, size*0.45, size*0.04, 0.2, Math.PI - 0.2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx + size*0.1, size*0.45, size*0.04, 0.2, Math.PI - 0.2); ctx.stroke();
      // 小O嘴
      ctx.fillStyle = '#33691e';
      ctx.beginPath(); ctx.arc(cx, size*0.56, size*0.03, 0, Math.PI * 2); ctx.fill();
      break; // 哈密瓜：金黄色圆柱+密集网纹+短瓜蒂
      // 主体：圆柱形（圆角矩形）
      ctx.fillStyle = '#e8c547';
      var hamiR = size * 0.28;
      ctx.beginPath();
      ctx.moveTo(cx - size * 0.3, size * 0.25 + hamiR);
      ctx.arcTo(cx - size * 0.3, size * 0.25, cx - size * 0.3 + hamiR, size * 0.25, hamiR);
      ctx.lineTo(cx + size * 0.3 - hamiR, size * 0.25);
      ctx.arcTo(cx + size * 0.3, size * 0.25, cx + size * 0.3, size * 0.25 + hamiR, hamiR);
      ctx.lineTo(cx + size * 0.3, size * 0.75 - hamiR);
      ctx.arcTo(cx + size * 0.3, size * 0.75, cx + size * 0.3 - hamiR, size * 0.75, hamiR);
      ctx.lineTo(cx - size * 0.3 + hamiR, size * 0.75);
      ctx.arcTo(cx - size * 0.3, size * 0.75, cx - size * 0.3, size * 0.75 - hamiR, hamiR);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#d4a017';
      ctx.lineWidth = 1;
      ctx.stroke();
      // 网纹：交叉不规则细线
      ctx.strokeStyle = 'rgba(139,90,43,0.7)';
      ctx.lineWidth = 0.8;
      var hamiSeed = 98765;
      for (var hi = 0; hi < 18; hi++) {
        hamiSeed = (hamiSeed * 1103515245 + 12345) & 0x7fffffff;
        var ax = cx - size * 0.26 + (hamiSeed % 100) / 100 * size * 0.52;
        hamiSeed = (hamiSeed * 1103515245 + 12345) & 0x7fffffff;
        var ay = size * 0.28 + (hamiSeed % 100) / 100 * size * 0.44;
        hamiSeed = (hamiSeed * 1103515245 + 12345) & 0x7fffffff;
        var bx = cx - size * 0.26 + (hamiSeed % 100) / 100 * size * 0.52;
        hamiSeed = (hamiSeed * 1103515245 + 12345) & 0x7fffffff;
        var by = size * 0.28 + (hamiSeed % 100) / 100 * size * 0.44;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.stroke();
      }
      // 高光
      ctx.fillStyle = 'rgba(255,255,200,0.2)';
      ctx.beginPath();
      ctx.ellipse(cx - size * 0.13, size * 0.4, size * 0.06, size * 0.12, 0, 0, Math.PI * 2);
      ctx.fill();
      // 短瓜蒂
      ctx.strokeStyle = '#7a5230';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, size * 0.25);
      ctx.lineTo(cx, size * 0.14);
      ctx.stroke();
      // 蒂头小叶
      ctx.fillStyle = '#7cb342';
      ctx.beginPath();
      ctx.ellipse(cx + 3, size * 0.13, size * 0.05, size * 0.03, 0.5, 0, Math.PI * 2);
      ctx.fill();
      // 拟人：眯眼笑 😆
      ctx.strokeStyle = '#5d4037';
      ctx.lineWidth = 2;
      // 弯眼 ^ ^
      ctx.beginPath(); ctx.arc(cx - size*0.1, size*0.48, size*0.04, Math.PI + 0.3, -0.3); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx + size*0.1, size*0.48, size*0.04, Math.PI + 0.3, -0.3); ctx.stroke();
      // 张嘴笑
      ctx.beginPath(); ctx.arc(cx, size*0.58, size*0.06, 0.2, Math.PI - 0.2); ctx.stroke();
      break; // 苦瓜：长条形+瘤状突起+短瓜蒂
      // 主体：略弯的长椭圆
      ctx.fillStyle = '#7cb342';
      ctx.beginPath();
      ctx.ellipse(cx, cy, size * 0.22, size * 0.4, 0.05, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#558b2f';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // 纵向沟纹
      ctx.strokeStyle = 'rgba(85,139,47,0.4)';
      ctx.lineWidth = 1;
      for (var bi = -1; bi <= 1; bi++) {
        ctx.beginPath();
        ctx.moveTo(cx + bi * size * 0.12, size * 0.14);
        ctx.quadraticCurveTo(cx + bi * size * 0.14, cy, cx + bi * size * 0.12, size * 0.86);
        ctx.stroke();
      }
      // 瘤状突起（苦瓜最关键特征）
      var bumpRows = 5;
      for (var row = 0; row < bumpRows; row++) {
        var yPos = size * 0.2 + row * size * 0.15;
        for (var col = -1; col <= 1; col++) {
          var bx = cx + col * size * 0.13 + (row % 2) * size * 0.03;
          // 突起（浅色圆）
          ctx.fillStyle = '#aed581';
          ctx.beginPath();
          ctx.arc(bx, yPos, size * 0.05, 0, Math.PI * 2);
          ctx.fill();
          // 突起中心暗点
          ctx.fillStyle = '#689f38';
          ctx.beginPath();
          ctx.arc(bx, yPos, size * 0.02, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      // 短瓜蒂
      ctx.strokeStyle = '#558b2f';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(cx, size * 0.13);
      ctx.lineTo(cx, size * 0.05);
      ctx.stroke();
      // 拟人：苦脸 😣
      ctx.strokeStyle = '#33691e';
      ctx.lineWidth = 2;
      // 皱眉
      ctx.beginPath(); ctx.moveTo(cx - size*0.14, size*0.34); ctx.lineTo(cx - size*0.06, size*0.38); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + size*0.14, size*0.34); ctx.lineTo(cx + size*0.06, size*0.38); ctx.stroke();
      // 眼睛点
      ctx.fillStyle = '#33691e';
      ctx.beginPath(); ctx.arc(cx - size*0.08, size*0.44, size*0.025, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + size*0.08, size*0.44, size*0.025, 0, Math.PI * 2); ctx.fill();
      // 嘴角下垂
      ctx.beginPath(); ctx.arc(cx, size*0.58, size*0.05, Math.PI + 0.3, -0.3, true); ctx.stroke();
      break; // 甜瓜：浅绿圆形，带网纹
      ctx.fillStyle = '#dcedc8';
      ctx.beginPath();
      ctx.arc(cx, cy, size * 0.38, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#c5e1a5';
      ctx.lineWidth = 1;
      ctx.stroke();
      // 网纹
      ctx.strokeStyle = '#aed581';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(size * 0.15, size * 0.35);
      ctx.quadraticCurveTo(cx, size * 0.25, size * 0.85, size * 0.35);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(size * 0.2, size * 0.55);
      ctx.quadraticCurveTo(cx, size * 0.45, size * 0.8, size * 0.55);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(size * 0.15, size * 0.7);
      ctx.quadraticCurveTo(cx, size * 0.6, size * 0.85, size * 0.7);
      ctx.stroke();
      // 小茎
      ctx.strokeStyle = '#4caf50';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, size * 0.15);
      ctx.lineTo(cx + 3, size * 0.05);
      ctx.stroke();
      // 拟人：开心笑 😊
      ctx.fillStyle = '#33691e';
      // 圆眼点
      ctx.beginPath(); ctx.arc(cx - size*0.1, size*0.42, size*0.03, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + size*0.1, size*0.42, size*0.03, 0, Math.PI * 2); ctx.fill();
      // 微笑弧
      ctx.strokeStyle = '#33691e';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, size*0.52, size*0.07, 0.3, Math.PI - 0.3); ctx.stroke();
      break;
      return null;
  }
  var url = canvas.toDataURL('image/png');
  melonIconCache[cacheKey] = url;
  return url;
}


// 通用知识卡显示
function showKc(kcKey) {
  var card = KNOWLEDGE_CARDS[kcKey];
  if (!card) return;
  var L = currentLang;
  var d = card[L];
  document.getElementById('kc-emoji').textContent = card.emoji || '';
  document.getElementById('kc-name').textContent = d.name;
  document.getElementById('kc-title').textContent = d.title;
  document.getElementById('kc-intro').textContent = d.intro;
  document.getElementById('kc-facts').textContent = d.facts;
  document.getElementById('kc-credit').textContent = '';
  document.getElementById('kc-modal').classList.add('show');
  G.paused = true;
}

// 奇功卡触发（首次使用该技能）
function showSkillCard(skillKey) {
  G.skillCardsShown[skillKey] = true;
  var kcKey = 'skill_' + skillKey;
  if (!KNOWLEDGE_CARDS[kcKey]) return;
  setTimeout(function(){ showKc(kcKey); }, 600);
}

// ======================== 知识卡 ========================
function showKnowledgeCard(melonKey) {
  var emojiEl = document.getElementById('kc-emoji');
  if (MELON_PHOTOS[melonKey]) {
    emojiEl.innerHTML = '<img src="' + MELON_PHOTOS[melonKey] + '" width="120" height="120" style="display:block;margin:0 auto;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.4);">';
  } else {
    if (MELON_ICONS[melonKey]) {
      emojiEl.innerHTML = '<img src="' + MELON_ICONS[melonKey] + '" width="64" height="64" style="display:block;margin:0 auto;border-radius:8px;">';
    } else {
      emojiEl.textContent = MELON_BASE[melonKey].emoji;
    }
  }
  document.getElementById('kc-name').textContent = tm(melonKey, 'name');
  document.getElementById('kc-title').textContent = tm(melonKey, 'title');
  document.getElementById('kc-intro').textContent = tm(melonKey, 'intro');
  document.getElementById('kc-facts').textContent = tm(melonKey, 'facts');
  var credits = {
    watermelon: 'Wikimedia Commons / Public Domain',
    cucumber: 'Wikimedia Commons / Public Domain',
    cantaloupe: 'Forest & Kim Starr / Wikimedia Commons (CC BY 3.0)',
    hami: 'Wikimedia Commons / Public Domain',
    winter: 'Wikimedia Commons / Public Domain',
    pumpkin: 'Wikimedia Commons / CC BY-SA',
    bitter: 'Wikimedia Commons / Public Domain'
  };
  document.getElementById('kc-credit').textContent = MELON_PHOTOS[melonKey] ? ('\u7167\u7247\u6765\u6e90\uff1a' + (credits[melonKey] || 'Wikimedia Commons')) : '';
  document.getElementById('kc-modal').classList.add('show');
  G.paused = true;
}

function closeKc() {
  document.getElementById('kc-modal').classList.remove('show');
  G.paused = false;
}

// ======================== 开瓜弹出 ========================
function showMelonPop(melonKey, text) {
  var emojiEl = document.getElementById('pop-emoji');
  if (MELON_ICONS[melonKey]) {
    emojiEl.innerHTML = '<img src="' + MELON_ICONS[melonKey] + '" width="48" height="48" style="display:block;margin:0 auto;border-radius:6px;">';
  } else {
    emojiEl.textContent = MELON_BASE[melonKey].emoji;
  }
  document.getElementById('pop-text').textContent = tm(melonKey, 'name');
  document.getElementById('pop-text').style.color = melonKey === 'bitter' ? '#97C459' : '#FAC775';
  document.getElementById('pop-energy').textContent = text;
  document.getElementById('pop-energy').style.color = melonKey === 'bitter' ? '#97C459' : '#5DCAA5';
  var pop = document.getElementById('melon-pop');
  pop.classList.remove('show');
  void pop.offsetWidth;
  pop.classList.add('show');
  setTimeout(function(){ pop.classList.remove('show'); }, 1200);
}

// ======================== 提示 ========================
var toastTimer = null;
function showToast(msg) {
  var tt = document.getElementById('toast');
  tt.textContent = msg;
  tt.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ tt.classList.remove('show'); }, 2000);
}

// ======================== 键盘输入 ========================
document.addEventListener('keydown', function(e) {
  if (document.getElementById('game-wrap').classList.contains('hidden')) return;
  if (document.getElementById('kc-modal').classList.contains('show')) return;
  if (document.getElementById('overlay').classList.contains('show')) return;
  if (celebration.active) return;
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': tryMove(0,-1); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': tryMove(0,1); e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': tryMove(-1,0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': tryMove(1,0); e.preventDefault(); break;
    case 't': case 'T': toggleTunnel(); break;
  }
});

// ======================== 启动 ========================
init();
</script>
